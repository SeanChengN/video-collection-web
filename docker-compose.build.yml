services:
  web:
    container_name: video-collection
    restart: unless-stopped
    build: .
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_USER: username
      DB_PASSWORD: password
      DB_DATABASE: movies
      EMBY_SERVER_URL: http://your-emby-server-address
      EMBY_USERNAME: your-emby-username
      EMBY_PASSWORD: your-emby-password
      JACKETT_URL: http://your-jackett-server-address
      THUNDER_URL: http://your-thunder-server-address
      VIDEO_LIBRARY_ROOT: /videos
    volumes:
      - ./images:/images
      - ./videos:/videos:ro

  db:
    image: mariadb:lts
    container_name: video-collection-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: movies
      MYSQL_USER: username
      MYSQL_PASSWORD: password
    volumes:
      - ./:/var/lib/mysql:rw
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uusername -ppassword"]
      interval: 10s
      timeout: 5s
      retries: 3
