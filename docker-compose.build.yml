services:
  web:
    container_name: video-collection
    restart: unless-stopped
    build:
      context: .
      dockerfile: dockerfile
    ports:
      - "${WEB_PORT:-5000}:5000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER:?Set DB_USER in .env}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      DB_DATABASE: ${DB_DATABASE:-movies}
      TZ: ${TZ:-Asia/Shanghai}
      EMBY_SERVER_URL: ${EMBY_SERVER_URL:-}
      EMBY_USERNAME: ${EMBY_USERNAME:-}
      EMBY_PASSWORD: ${EMBY_PASSWORD:-}
      JACKETT_URL: ${JACKETT_URL:-}
      THUNDER_URL: ${THUNDER_URL:-}
      VIDEO_LIBRARY_ROOT: /videos
      APP_ACCESS_TOKEN: ${APP_ACCESS_TOKEN:-}
      SECRET_KEY: ${SECRET_KEY:-}
      APP_DEBUG: ${APP_DEBUG:-0}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-0}
      AUTH_RATE_LIMIT_ATTEMPTS: ${AUTH_RATE_LIMIT_ATTEMPTS:-10}
      AUTH_RATE_LIMIT_WINDOW_SECONDS: ${AUTH_RATE_LIMIT_WINDOW_SECONDS:-300}
      MAX_IMAGE_UPLOAD_MB: ${MAX_IMAGE_UPLOAD_MB:-10}
      DB_BACKUP_DIR: ${DB_BACKUP_DIR:-/backups}
      DB_BACKUP_INCLUDE_ROUTINES: ${DB_BACKUP_INCLUDE_ROUTINES:-0}
      DB_BACKUP_SCHEDULE_ENABLED: ${DB_BACKUP_SCHEDULE_ENABLED:-0}
      DB_BACKUP_SCHEDULE_TIME: ${DB_BACKUP_SCHEDULE_TIME:-00:00}
      DB_BACKUP_RETENTION_COUNT: ${DB_BACKUP_RETENTION_COUNT:-7}
    volumes:
      - ./images:/images
      - ./videos:/videos
      - ./backups:/backups
    healthcheck:
      test: ["CMD", "python", "/app/healthcheck.py"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  db:
    image: mariadb:lts
    container_name: video-collection-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
      MYSQL_DATABASE: ${DB_DATABASE:-movies}
      MYSQL_USER: ${DB_USER:?Set DB_USER in .env}
      MYSQL_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      MYSQL_AUTO_UPGRADE: 1
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ./db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} -e 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 3
