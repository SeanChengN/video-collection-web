services:
  web:
    container_name: video-collection
    restart: unless-stopped
    build:
      context: .
      dockerfile: dockerfile
    ports:
      - "${WEB_PORT:-5000}:5000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER:-username}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_DATABASE: ${DB_DATABASE:-movies}
      EMBY_SERVER_URL: ${EMBY_SERVER_URL:-http://your-emby-server-address}
      EMBY_USERNAME: ${EMBY_USERNAME:-your-emby-username}
      EMBY_PASSWORD: ${EMBY_PASSWORD:-your-emby-password}
      JACKETT_URL: ${JACKETT_URL:-http://your-jackett-server-address}
      THUNDER_URL: ${THUNDER_URL:-http://your-thunder-server-address}
      VIDEO_LIBRARY_ROOT: /videos
      APP_ACCESS_TOKEN: ${APP_ACCESS_TOKEN:-}
      APP_DEBUG: ${APP_DEBUG:-0}
      MAX_IMAGE_UPLOAD_MB: ${MAX_IMAGE_UPLOAD_MB:-10}
      DB_BACKUP_DIR: ${DB_BACKUP_DIR:-/backups}
      DB_BACKUP_INCLUDE_ROUTINES: ${DB_BACKUP_INCLUDE_ROUTINES:-0}
    volumes:
      - ./images:/images
      - ./videos:/videos:ro
      - ./backups:/backups
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/healthz', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  db:
    image: mariadb:lts
    container_name: video-collection-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-password}
      MYSQL_DATABASE: ${DB_DATABASE:-movies}
      MYSQL_USER: ${DB_USER:-username}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_AUTO_UPGRADE: 1
    volumes:
      - ./db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} -e 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 3
